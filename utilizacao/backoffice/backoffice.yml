openapi: 3.0.0
info:
  title: Backoffice API
  description: |-
    Opus TPP - Backoffice Endpoints

    Endpoints para operações backoffice (gestão interna) no Opus TPP.
  version: 1.0.0-beta.1
tags:
  - name: Consents
    description: |-
      Endpoints para gerenciamento de consentimentos
  - name: Enrollments
    description: |-
      Endpoints para gerenciamento de enrollments
  - name: Payments
    description: |-
      Endpoints para gerenciamento de pagamentos
servers:
  - url: https://client.qa.oofc.opus-software.com.br
paths:
  /backoffice/consents:
    get:
      tags:
        - Consents
      operationId: getBackofficeConsents
      summary: Listar consentimentos com filtros
      description: |-
        Retorna uma lista de consentimentos de acordo com os filtros especificados. 
        Suporta paginação, ordenação e múltiplos critérios de busca.
      parameters:
        - $ref: '#/components/parameters/cnpj'
        - $ref: '#/components/parameters/cpf'
        - $ref: '#/components/parameters/createdOnBegin'
        - $ref: '#/components/parameters/createdOnEnd'
        - $ref: '#/components/parameters/expiresOn'
        - $ref: '#/components/parameters/searchKey'
        - $ref: '#/components/parameters/searchKeys'
        - $ref: '#/components/parameters/tppId'
        - $ref: '#/components/parameters/consentStatus'
        - $ref: '#/components/parameters/consentStatusList'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/consentIdList'
        - $ref: '#/components/parameters/consentStatusList'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/orderType'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Lista de consentimentos retornada com sucesso
          headers:
            x-correlation-id:
              description: ID único para correlacionar requisições
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBackofficeConsentsResponse'
  /backoffice/enrollments:
    get:
      tags:
        - Enrollments
      operationId: getBackofficeEnrollments
      summary: Listar enrollments com filtros
      description: |-
        Retorna uma lista de enrollments de acordo com os filtros especificados. 
        Suporta paginação, ordenação e múltiplos critérios de busca.
      parameters:
        - $ref: '#/components/parameters/cnpj'
        - $ref: '#/components/parameters/cpf'
        - $ref: '#/components/parameters/createdOnBegin'
        - $ref: '#/components/parameters/createdOnEnd'
        - $ref: '#/components/parameters/expiresOn'
        - $ref: '#/components/parameters/tppId'
        - $ref: '#/components/parameters/enrollmentId'
        - $ref: '#/components/parameters/enrollmentIdList'
        - $ref: '#/components/parameters/enrollmentStatus'
        - $ref: '#/components/parameters/enrollmentStatusList'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/orderType'
        - $ref: '#/components/parameters/applicationId'
      responses:
        '200':
          description: Lista de enrollments retornada com sucesso
          headers:
            x-correlation-id:
              description: ID único para correlacionar requisições
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBackofficeEnrollmentsResponse'
  /backoffice/consents/{consentId}/payments:
    get:
      tags:
        - Payments
      operationId: getBackofficeConsentPayments
      summary: Listar pagamentos de um consentimento específico
      description: |-
        Retorna uma lista de pagamentos associados a um consentimento específico.
        Suporta paginação e ordenação.
      parameters:
        - $ref: '#/components/parameters/consentId'
      responses:
        '200':
          description: Lista de pagamentos retornada com sucesso
          headers:
            x-correlation-id:
              description: ID único para correlacionar requisições
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBackofficePaymentsResponse'
components:
  parameters:
    tppId:
      name: brandId
      in: query
      description: Identificador interno do OpusTPP da marca associada ao recurso
      schema:
        $ref: '#/components/schemas/TppId'
    cnpj:
      name: cnpj
      in: query
      description: CNPJ da empresa à qual o recurso pertence
      schema:
        $ref: '#/components/schemas/CNPJ'
    cpf:
      name: cpf
      in: query
      description: CPF do usuário à qual o recurso pertence
      schema:
        $ref: '#/components/schemas/CPF'
    createdOnBegin:
      name: createdOnBegin
      in: query
      description: |-
        Data mínima de criação do recurso (ISO 8601).
        Será considerado o intervalo entre createdOnBegin e createdOnEnd.
      schema:
        $ref: '#/components/schemas/DateTime'
    createdOnEnd:
      name: createdOnEnd
      in: query
      description: |-
        Data máxima de criação do recurso (ISO 8601).
        Será considerado o intervalo entre createdOnBegin e createdOnEnd.
      schema:
        $ref: '#/components/schemas/DateTime'
    expiresOn:
      name: expiresOn
      in: query
      description: Data de expiração do recurso, caso exista (ISO 8601)
      schema:
        $ref: '#/components/schemas/DateTime'
    searchKey:
      name: searchKey
      in: query
      description: |-
        Identificador usado para encontrar recurso de forma rápida por critérios já mapeados durante a criação do recurso.
        Será considerada a união com searchKeys.
      schema:
        $ref: '#/components/schemas/SearchKey'
    searchKeys:
      name: searchKeys
      in: query
      description: |-
        Lista de identificadores usados para encontrar recursos de forma rápida por critérios já mapeados durante a criação do recurso, separados por vírgula.
        Será considerada a união com searchKey.
      schema:
        $ref: '#/components/schemas/SearchKeys'
    page:
      name: page
      in: query
      description: Número da página a ser retornada (para paginação dos resultados)
      schema:
        $ref: '#/components/schemas/PageNumber'
    pageSize:
      name: pageSize
      in: query
      description: Quantidade máxima de registros por página
      schema:
        $ref: '#/components/schemas/PageSize'
    orderType:
      name: orderType
      in: query
      description: Ordenação dos resultados pela data de criação
      schema:
        $ref: '#/components/schemas/OrderType'
    applicationId:
      name: x-application-id
      in: header
      description: |-
        Identificador da aplicação cliente que está requisitando o OpusTPP.
      required: true
      schema:
        $ref: '#/components/schemas/ApplicationId'
    enrollmentId:
      name: enrollmentId
      in: query
      description: |-
        Identificador único do enrollment.
        Será considerada a união com enrollmentIdList.
      schema:
        $ref: '#/components/schemas/UUID'
    enrollmentIdList:
      name: enrollmentIdList
      in: query
      description: |-
        Lista de identificadores de enrollment separados por vírgula.
        Será considerada a união com enrollmentId.
      schema:
        $ref: '#/components/schemas/UUIDList'
    consentId:
      name: consentId
      in: query
      description: |-
        Identificador único do consentimento.
        Será considerada a união com consentIdList.
      schema:
        $ref: '#/components/schemas/UUID'
    consentIdList:
      name: consentIdList
      in: query
      description: |-
        Lista de identificadores de consentimento separados por vírgula.
        Será considerada a união com consentId.
      schema:
        $ref: '#/components/schemas/UUIDList'
    consentStatus:
      name: status
      in: query
      description: |-
        Status do consentimento.
        Será considerada a união com statusList.
      schema:
        $ref: '#/components/schemas/ConsentStatus'
    consentStatusList:
      name: statusList
      in: query
      description: |-
        Lista de status possíveis para busca, separados por vírgula.
        Será considerada a união com status.
      schema:
        $ref: '#/components/schemas/ConsentStatusList'
    enrollmentStatus:
      name: status
      in: query
      description: |-
        Status do enrollment.
        Será considerada a união com statusList.
      schema:
        $ref: '#/components/schemas/EnrollmentStatus'
    enrollmentStatusList:
      name: statusList
      in: query
      description: |-
        Lista de status possíveis para busca, separados por vírgula.
        Será considerada a união com status.
      schema:
        $ref: '#/components/schemas/EnrollmentStatusList'
  schemas:
    TppId:
      type: string
      format: uuid
      description: Identificador da marca interno do OpusTPP 
      example: 'abc123'
    TppLogo:
      type: string
      format: uri
      description: Logo da tpp
      example: 'https://example.com/logo.png'
    TppName:
      type: string
      description: Nome da tpp
      example: 'Amazing Bank'
    CNPJ:
      type: string
      pattern: '^[A-Za-z0-9]{14}$'
      description: CNPJ da empresa (14 caracteres alfanuméricos)
      example: 'AB12CD34EF56GH'
    CPF:
      type: string
      pattern: '^[A-Za-z0-9]{11}$'
      description: CPF do usuário (11 caracteres alfanuméricos)
      example: 'A1B2C3D4E5F'
    SearchKey:
      type: string
      description: Identificador usado para encontrar recurso de forma rápida por critérios já mapeados durante a criação do recurso.
      example: 'cpf:98765432100'
    SearchKeys:
      type: string
      description: Lista de identificadores usados para encontrar recursos de forma rápida por critérios já mapeados durante a criação do recurso, separados por vírgula.
      example: 'cpf:98765432100,cnpj:12345678000199'
    DateTime:
      type: string
      format: date-time
      description: Data e hora em formato ISO 8601
      example: '2024-01-01T00:00:00Z'
    PageNumber:
      type: integer
      minimum: 1
      default: 1
      description: Número da página para paginação
      example: 1
    PageSize:
      type: integer
      minimum: 1
      maximum: 100
      default: 25
      description: Quantidade máxima de registros por página
      example: 25
    OrderType:
      type: string
      enum:
        - ASC
        - DESC
      default: DESC
      description: Ordenação dos resultados (ASC para crescente, DESC para decrescente) com base na data de criação do recurso
      example: DESC
    ApplicationId:
      type: string
      format: uuid
      description: Identificador único da aplicação cliente
      example: 'b9334f6e-a2ad-42ee-86c9-946ee0f0bb54'
    UUID:
      type: string
      format: uuid
      description: Identificador único do recurso
      example: 'urn:amazingbank:5b39e7c2-0f6d-42e1-9a0a-fc6e33d82f70'
    UUIDList:
      type: string
      format: uuid
      description: Lista de identificadores de recursos separados por vírgula
      example: 'urn:amazingbank:5b39e7c2-0f6d-42e1-9a0a-fc6e33d82f70,urn:amazingbank:e14aa78c-6d94-4462-85a6-7d8ecf8af99b'
    ConsentStatus:
      type: string
      description: Status do consentimento. Os status de consentimento são descritos na documentação https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/DC+API+-+Consentimento
      example: AUTHORISED
    ConsentStatusList:
      type: string
      description: Lista de status possíveis para busca, separados por vírgula. Os status de consentimento são descritos na documentação https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/DC+API+-+Consentimento
      example: 'AUTHORISED,AWAITING_RISK_SIGNALS'
    EnrollmentStatus:
      type: string
      description: Status do enrollment. Os status de enrollment são descritos na documentação https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      example: AUTHORISED
    EnrollmentStatusList:
      type: string
      description: Lista de status possíveis para busca, separados por vírgula. Os status de enrollment são descritos na documentação https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      example: 'AUTHORISED,AWAITING_RISK_SIGNALS'
    Meta:
      type: object
      required:
        - totalRecords
        - totalPages
        - requestDateTime
      properties:
        totalRecords:
          type: integer
          description: Total de registros encontrados
        totalPages:
          type: integer
          description: Total de páginas disponíveis
        requestDateTime:
          type: string
          format: date-time
          description: Data e hora da requisição UTC
          example: '2024-06-15T10:30:45.123Z'
    TppData:
      type: object
      required:
        - internalTppId
        - tppName
        - tppLogo
      description: Informações da tpp associada ao recurso
      properties:
        internalTppId:
          $ref: '#/components/schemas/TppId'
        tppName:
          $ref: '#/components/schemas/TppName'
        tppLogo:
          $ref: '#/components/schemas/TppLogo'
    RegulatoryEnrollmentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao enrollment:
        - POST /open-banking/enrollments/v*/enrollment
        - GET /open-banking/enrollments/v*/enrollment/{enrollmentId}

        O conteúdo já decodificado e serializado em objeto JSON.

        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
    RegulatoryConsentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao consentimento de transmissão de dados:
        - POST /open-banking/consents/v*/consents
        - GET /open-banking/consents/v*/consents/{consentId}
        
        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/DC+API+-+Consentimento
    RegulatoryPaymentConsentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao consentimento de pagamentos:
        - POST /open-banking/payments/v*/consents
        - GET /open-banking/payments/v*/consents/{consentId}

        O conteúdo já decodificado e serializado em objeto JSON.
        
        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/SV+API+-+Pagamentos
    RegulatoryRecurringConsentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao consentimento de pagamentos recorrentes:
        - POST /open-banking/automatic-payments/v*/recurring-consents
        - GET /open-banking/automatic-payments/v*/recurring-consents/{recurringConsentId}

        O conteúdo já decodificado e serializado em objeto JSON.
        
        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos
    RegulatoryPaymentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao pagamento:
        - POST /open-banking/payments/v*/pix/payments
        - GET /open-banking/payments/v*/pix/payments/{paymentId}

        O conteúdo já decodificado e serializado em objeto JSON.
        
        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/SV+API+-+Pagamentos
    RegulatoryRecurringPaymentData:
      type: object
      description: |-
        Todo o conteúdo do objeto `data` que vem no retorno regulatório dos seguintes endpoints relacionados ao pagamento recorrente:
        - POST /open-banking/automatic-payments/v*/pix/recurring-payments
        - GET /open-banking/automatic-payments/v*/pix/recurring-payments/{recurringPaymentId}

        O conteúdo já decodificado e serializado em objeto JSON.
        
        Link para documentação regulatória: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos
    GetBackofficeEnrollmentsResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          description: Lista de enrollments com dados regulatórios e adicionais
          items:
            $ref: '#/components/schemas/EnrollmentSummary'
        meta:
          $ref: '#/components/schemas/Meta'
    EnrollmentSummary:
      type: object
      required:
        - regulatoryEnrollmentData
        - additionalData
      properties:
        regulatoryEnrollmentData:
          $ref: '#/components/schemas/RegulatoryEnrollmentData'
        additionalData:
          type: object
          required:
            - tppData
            - regulatoryLinkedConsentData
          properties:
            tppData:
              $ref: '#/components/schemas/TppData'
            regulatoryLinkedConsentData:
              allOf:
                - $ref: '#/components/schemas/RegulatoryConsentData'
              description: Retorna dados do consentimento secundário aprovado associado ao enrollment, 
                caso exista e ainda esteja com status AUTHORISED.
    GetBackofficeConsentsResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          description: Lista de consentimentos com dados regulatórios e adicionais
          items:
            $ref: '#/components/schemas/BackofficeConsentSummary'
        meta:
          $ref: '#/components/schemas/Meta'
    BackofficeConsentSummary:
      type: object
      description: |-
        Estrutura temporária específica do endpoint /backoffice/consents.
        Pode evoluir no futuro para convergir com o padrão das demais respostas.
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          type: string
          description: Tipo de consentimento
          nullable: true
          example: DATA_SHARING
          enum:
            - DATA_SHARING
            - PAYMENT
        status:
          $ref: '#/components/schemas/ConsentStatus'
        createdOn:
          $ref: '#/components/schemas/DateTime'
        expiresOn:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          nullable: true
          description: Data de expiração do consentimento, quando aplicável
        brandId:
          $ref: '#/components/schemas/TppId'
        tppLogo:
          $ref: '#/components/schemas/TppLogo'
        tppName:
          $ref: '#/components/schemas/TppName'
        modalityType:
          type: string
          description: Tipo de modalidade de consentimento de pagamento, quando aplicável.
          example: IMMEDIATE
          enum:
            - IMMEDIATE
            - SWEEPING
            - SCHEDULED
            - AUTOMATIC
        purpose:
          type: string
          nullable: true
          description: |-
            Finalidade da transação (campo /data/payment/purpose da API de Iniciação de Pagamento, adicionado na V5).
          example: IMMEDIATE
          enum:
            - IMMEDIATE
            - SINGLE_SCHEDULED
            - RECURRENT_SCHEDULED
            - WITHDRAW
            - CHANGE
        authorisationServerId:
          $ref: '#/components/schemas/UUID'
          description: Identificador do servidor de autorização
    GetBackofficePaymentsResponse:
        type: object
        required:
          - data
          - meta
        properties:
          data:
            type: array
            description: Lista de pagamentos associados a um consentimento específico
            items:
              $ref: '#/components/schemas/PaymentSummary'
          meta:
            $ref: '#/components/schemas/Meta'
    PaymentSummary:
      type: object
      description: |-
        Estrutura temporária específica do endpoint /backoffice/consents/{consentId}/payments.
        Pode evoluir no futuro para convergir com o padrão das demais respostas.
      required:
        - regulatoryData
      properties:
        regulatoryData:
          type: object
          required:
            - paymentData
          properties:
            paymentData:
              oneOf:
                - $ref: '#/components/schemas/RegulatoryPaymentData'
                - $ref: '#/components/schemas/RegulatoryRecurringPaymentData'